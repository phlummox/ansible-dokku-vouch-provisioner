name: vagrant-test

on: ["push"]

jobs:
  build:
    runs-on: ubuntu-18.04
    env:
      VAGRANT_VERSION: "2.2.14"
      LIBVIRT_PLUGIN_VERSION: "0.0.1"

    steps:

    - name: set path
      run: |
        set -euo pipefail
        set -x

        mkdir -p ~/.local/bin
        echo "PATH=${HOME}/.local/bin:${PATH}" >> $GITHUB_ENV

    - uses: actions/checkout@v2

