      env:
        PY_COLORS: '1'
        ANSIBLE_FORCE_COLOR: '1'
      run: |
        set -euo pipefail
        set -x

        sudo su -l $USER -c "set -ex; export PY_COLORS=$PY_COLORS; export ANSIBLE_FORCE_COLOR=$ANSIBLE_FORCE_COLOR; export CI=$CI; export PATH=$PATH; cd $PWD/ansible-roles; pwd; make run_tests_libvirt"

