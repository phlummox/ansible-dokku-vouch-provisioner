    #    #false

    - name: Install/build python-based dependencies
      run: |
        set -euo pipefail
        set -x

        cd install-ansible
        make py_prereqs


    - name: Run molecule tests
      # force colors for molecule and ansible, even
      # though not tty
      env:
        PY_COLORS: '1'
        ANSIBLE_FORCE_COLOR: '1'
      run: |
        set -euo pipefail
        set -x

        sudo su -l $USER -c "set -ex; export CI=$CI; cd $PWD/ansible-roles; pwd; make run_tests_libvirt"

